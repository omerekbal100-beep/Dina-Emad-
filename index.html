<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوم مميز</title>
    <style>
        :root { 
            --space-bg: linear-gradient(135deg, #f0f4f8 0%, #e5eef5 100%); /* خلفية سماوية ناعمة تشبه السديم */
            --soft-blue: #a2d2ff; /* أزرق فاتح هادي جداً للزراير */
            --text-dark: #2c3e50;
            --star-color: rgba(255, 255, 255, 0.8);
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: var(--space-bg); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; position: relative; 
        }

        /* تأثير المجرات والنجوم */
        .galaxy-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .star { 
            position: absolute; background: white; border-radius: 50%; 
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: float 6s infinite ease-in-out; 
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.8; }
        }

        .corner-text { position: absolute; top: 20px; left: 20px; font-size: 13px; color: #555; z-index: 20; font-family: 'Courier New', monospace; letter-spacing: 1px; }

        .card { 
            background: rgba(255, 255, 255, 0.7); 
            padding: 50px 40px; border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.03); 
            z-index: 10; width: 85%; max-width: 420px; text-align: center; 
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4);
            display: none; 
        }
        .active-card { display: block; animation: fadeIn 1.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { color: var(--text-dark); font-size: 22px; line-height: 1.7; margin-bottom: 35px; font-weight: 400; }
        .celebrate-h1 { color: #8eaddb; font-weight: bold; }

        button { 
            padding: 15px 40px; font-size: 17px; font-weight: 600; 
            border: none; border-radius: 30px; cursor: pointer; 
            transition: all 0.4s ease; background: var(--soft-blue); 
            color: #fff; box-shadow: 0 8px 20px rgba(162, 210, 255, 0.3);
        }
        button:hover { background: #8ec7ff; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(162, 210, 255, 0.4); }

        #player { display: none; }
    </style>
</head>
<body>

<div class="galaxy-container" id="galaxy"></div>
<div id="player"></div>
<div class="corner-text">You are my yellow person💛</div>

<div class="card active-card" id="page1">
    <h1>عارفة إن النهاردة يوم مميز؟</h1>
    <button onclick="startExperience()">التالي</button>
</div>

<div class="card" id="page2">
    <h1>النهاردة من 20 سنة بالظبط، اتولد حد بيقرا الكلام ده دلوقتي..</h1>
    <h1>عاوزة تعرفي هو مين؟</h1>
    <button onclick="nextPage(2, 3)">التالي</button>
</div>

<div class="card" id="page3">
    <div class="final-msg">
        <h1 class="celebrate-h1">كل سنه وانت طيبه يا دينا ❤️🥳 🥰</h1>
        <h1>و ربنا يجعلها سنه سعيدة عليكي يارب ♥️</h1>
        <h1>يارب اليوم يكون مميز و سعيد ليكي♥️</h1>
        <p style="font-size: 17px; color: #777;">وحابب أفكرك إن أنا موجود علشانك دايماً.</p>
    </div>
</div>

<script>
    function createGalaxy() {
        const container = document.getElementById('galaxy');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 4 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.opacity = Math.random();
            container.appendChild(star);
        }
    }
    createGalaxy();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0', videoId: 'yKNxeF4KMsY', 
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady(event) {}

    function startExperience() {
        player.playVideo();
        nextPage(1, 2);
    }

    function nextPage(current, next) {
        document.getElementById('page' + current).classList.remove('active-card');
        document.getElementById('page' + next).classList.add('active-card');
    }
</script>

</body>
</html>
