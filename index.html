<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوم مميز</title>
    <style>
        :root { 
            --space-bg: linear-gradient(to bottom, #020107 0%, #050b1a 50%, #0a1628 100%);
            --soft-blue: #48cae4; 
        }
        
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--space-bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; position: relative; }

        .stars-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8) translate3d(0,0,0); } 50% { opacity: 1; transform: scale(1.2) translate3d(0,0,0); } }

        #lyrics-container { position: absolute; width: 100%; text-align: center; bottom: 12%; color: white; font-size: 19px; opacity: 0; z-index: 1; transition: opacity 0.8s; font-style: italic; text-shadow: 0 0 10px rgba(255,255,255,0.4); pointer-events: none; padding: 0 20px; box-sizing: border-box; }

        .corner-text { position: absolute; top: 20px; left: 20px; font-size: 13px; color: #fff; opacity: 0.6; z-index: 20; font-family: 'Courier New', monospace; }

        .card { background: rgba(255, 255, 255, 0.08); padding: 45px 35px; border-radius: 35px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); z-index: 10; width: 80%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); display: none; }
        .active-card { display: block; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #ffffff; font-size: 21px; line-height: 1.6; margin-bottom: 30px; }
        .celebrate-h1 { color: #ffd700; font-weight: bold; }

        button { padding: 14px 40px; font-size: 17px; font-weight: 600; border: none; border-radius: 30px; cursor: pointer; background: var(--soft-blue); color: #020107; }
    </style>
</head>
<body>

<div class="stars-container" id="stars"></div>
<div id="lyrics-container"></div>
<div class="corner-text">You are my yellow person💛</div>

<audio id="bgMusic" preload="auto">
    <source src="Coldplay - Yellow (Official Video)(M4A_128K).m4a" type="audio/mp4">
</audio>

<div class="card active-card" id="page1">
    <h1>عارفة إن النهاردة يوم مميز؟</h1>
    <button onclick="startExperience()">التالي</button>
</div>

<div class="card" id="page2">
    <h1>النهاردة من 20 سنة بالظبط، اتولد حد بيقرا الكلام ده دلوقتي..</h1>
    <h1>عاوزة تعرفي هو مين؟</h1>
    <button onclick="nextPage(2, 3)">التالي</button>
</div>

<div class="card" id="page3">
    <div class="final-msg">
        <h1 class="celebrate-h1">كل سنه وانت طيبه يا دينا ❤️🥳 🥰</h1>
        <h1>و ربنا يجعلها سنه سعيدة عليكي يارب ♥️</h1>
        <h1>يارب اليوم يكون مميز و سعيد ليكي♥️</h1>
        <p style="font-size: 17px; color: #e0e0e0; opacity: 0.8;">وحابب أفكرك إن أنا موجود علشانك دايماً.</p>
    </div>
</div>
