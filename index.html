<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوم مميز</title>
    <style>
        :root { 
            /* ألوان الفضاء العميقة */
            --space-bg: linear-gradient(to bottom, #020107 0%, #050b1a 50%, #0a1628 100%);
            --soft-blue: #48cae4; /* أزرق فاتح هادي للزراير */
            --star-white: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: var(--space-bg); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; position: relative; 
        }

        /* تأثير النجوم والمجرات */
        .stars-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .star { 
            position: absolute; background: white; border-radius: 50%; 
            animation: twinkle var(--d) infinite ease-in-out; 
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        .corner-text { position: absolute; top: 20px; left: 20px; font-size: 13px; color: #fff; opacity: 0.7; z-index: 20; font-family: 'Courier New', monospace; }

        /* تصميم البوكس الزجاجي الشفاف */
        .card { 
            background: rgba(255, 255, 255, 0.08); 
            padding: 50px 40px; border-radius: 40px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
            z-index: 10; width: 85%; max-width: 420px; text-align: center; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: none; 
        }
        .active-card { display: block; animation: fadeIn 1.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #ffffff; font-size: 22px; line-height: 1.7; margin-bottom: 35px; font-weight: 400; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .celebrate-h1 { color: #ffd700; font-weight: bold; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }

        button { 
            padding: 15px 45px; font-size: 17px; font-weight: 600; 
            border: none; border-radius: 30px; cursor: pointer; 
            transition: all 0.4s ease; background: var(--soft-blue); 
            color: #020107; box-shadow: 0 5px 15px rgba(72, 202, 228, 0.4);
        }
        button:hover { background: #90e0ef; transform: scale(1.05); }

        #player { display: none; }
    </style>
</head>
<body>

<div class="stars-container" id="stars"></div>
<div id="player"></div>
<div class="corner-text">You are my yellow person💛</div>

<div class="card active-card" id="page1">
    <h1>عارفة إن النهاردة يوم مميز؟</h1>
    <button onclick="startExperience()">التالي</button>
</div>

<div class="card" id="page2">
    <h1>النهاردة من 20 سنة بالظبط، اتولد حد بيقرا الكلام ده دلوقتي..</h1>
    <h1>عاوزة تعرفي هو مين؟</h1>
    <button onclick="nextPage(2, 3)">التالي</button>
</div>

<div class="card" id="page3">
    <div class="final-msg">
        <h1 class="celebrate-h1">كل سنه وانت طيبه يا دينا ❤️🥳 🥰</h1>
        <h1>و ربنا يجعلها سنه سعيدة عليكي يارب ♥️</h1>
        <h1>يارب اليوم يكون مميز و سعيد ليكي♥️</h1>
        <p style="font-size: 17px; color: #e0e0e0; opacity: 0.9;">وحابب أفكرك إن أنا موجود علشانك دايماً.</p>
    </div>
</div>

<script>
    function createStars() {
        const container = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }
    }
    createStars();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0', videoId: 'yKNxeF4KMsY', 
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady(event) {}

    function startExperience() {
        player.playVideo();
        nextPage(1, 2);
    }

    function nextPage(current, next) {
        document.getElementById('page' + current).classList.remove('active-card');
        document.getElementById('page' + next).classList.add('active-card');
    }
</script>

</body>
</html>
