<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوم مميز</title>
    <style>
        :root { 
            --bg-soft-cream: #fbfbf8; /* لون خلفية كريمي هادي جداً */
            --card-white: rgba(255, 255, 255, 0.85); /* كارت أبيض شفاف */
            --text-dark: #333333; /* لون نص أسود هادي */
            --soft-gold: #bca13a; /* لون ذهبي هادي للزراير والتهنئة */
            --star-white: rgba(255, 255, 255, 0.6); /* نجوم باهتة وخافتة */
        }
        
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-soft-cream); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; position: relative; }
        
        /* تأثير النجوم المتلألئة الخافتة */
        .stars { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: var(--star-white); border-radius: 50%; animation: twinkle 4s infinite linear; }
        @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1); } }

        /* الجملة في الزاوية العلوية اليسرى */
        .corner-text { position: absolute; top: 15px; left: 15px; font-size: 14px; color: var(--text-dark); font-weight: normal; z-index: 20; font-family: 'Courier New', Courier, monospace; /* خط يشبه الآلة الكاتبة وواضح */ }

        .card { background: var(--card-white); padding: 45px 35px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 10; width: 85%; max-width: 450px; text-align: center; border: 1px solid rgba(0,0,0,0.03); display: none; backdrop-filter: blur(5px); /* تأثير ضبابي خفيف وجميل */ }
        .active-card { display: block; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--text-dark); font-size: 24px; line-height: 1.6; margin-bottom: 30px; font-weight: 500; }
        .celebrate-h1 { color: var(--soft-gold); font-weight: bold; }

        button { padding: 14px 35px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: var(--soft-gold); color: white; margin-top: 25px; }
        button:hover { background: #a68c33; transform: scale(1.02); }

        #player { display: none; }
    </style>
</head>
<body>

<div class="stars" id="starContainer"></div>
<div id="player"></div>

<div class="corner-text">You are my yellow person💛</div>

<div class="card active-card" id="page1">
    <h1>عارفة إن النهاردة يوم مميز؟</h1>
    <button onclick="startExperience()">التالي</button>
</div>

<div class="card" id="page2">
    <h1>النهاردة من 20 سنة بالظبط، اتولد حد بيقرا الكلام ده دلوقتي..</h1>
    <h1>عاوزة تعرفي هو مين؟</h1>
    <button onclick="nextPage(2, 3)">التالي</button>
</div>

<div class="card" id="page3">
    <div class="final-msg">
        <h1 class="celebrate-h1">كل سنه وانت طيبه يا دينا ❤️🥳 🥰</h1>
        <h1>و ربنا يجعلها سنه سعيدة عليكي يارب ♥️</h1>
        <h1>يارب اليوم يكون مميز و سعيد ليكي♥️</h1>
        <p style="font-size: 18px; color: #666666;">وحابب أفكرك إن أنا موجود علشانك دايماً.</p>
    </div>
</div>

<script>
    function createStars() {
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 180; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 'px'; /* نجوم أصغر وخافتة */
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 4 + 's';
            container.appendChild(star);
        }
    }
    createStars();

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0',
            videoId: 'yKNxeF4KMsY', 
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady(event) { }

    function startExperience() {
        player.playVideo();
        nextPage(1, 2);
    }

    function nextPage(current, next) {
        document.getElementById('page' + current).classList.remove('active-card');
        document.getElementById('page' + next).classList.add('active-card');
    }
</script>

</body>
</html>
